name: Scaled E2E Automation Matrix (400 Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./automation
        run: |
          npm install
          npm install -g appium
          # Install specific drivers if required by your framework
          appium driver install uiautomator2

      - name: Enable KVM Hardware Acceleration
        run: |
          echo "Checking KVM availability..."
          kvm-ok || true
          sudo chmod 777 /dev/kvm || true

      - name: Start Appium Server
        run: |
          appium --log-level info &
          echo "Waiting for Appium to boot..."
          sleep 10

      - name: Execute 400+ Test Suite
        working-directory: ./automation
        env:
          TARGET_URL: "http://localhost:5000"
        run: npm run test:scaled

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: automation/reports/
